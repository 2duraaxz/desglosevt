<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Desglose para Ventanas y Puertas en RD</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="google-adsense-account" content="ca-pub-7905764936407202">
<meta name="description" content="Calculadora gratuita para desglose de ventanas y puertas en República Dominicana. Fácil, rápida y profesional.">
<meta name="google-site-verification" content="bvNejnMHIzALP0BOyenXvNjcj-IcUrlDMA7jDphKRYs" />

</head>

  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

<body>
<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="cerrarHistorial()"></div>

<!-- PANEL HISTORIAL LATERAL -->
<div id="panelHistorial" class="panel-historial">
    <div class="panel-header">
        <h3>Historial</h3>
        <button class="btn-volver" onclick="cerrarHistorial()">✖</button>
    </div>

    <div id="historial"></div>

    <button class="delete-btn" onclick="limpiarHistorial()">Borrar Todo</button>
</div>

<header>
    <h1>Desglose VT</h1>
    <div class="sub">Sistema Profesional de Desglose</div>
</header>

<div class="container">

    <!-- MENU PRINCIPAL -->
    <div id="menuPrincipal" class="center-box">
        <button onclick="mostrarVentanas()">VENTANAS</button>
        <button onclick="mostrarGabinete()">GABINETE</button>
    </div>

    <!-- SECCION VENTANAS -->
    <div id="seccionVentanas" class="section">

        <div class="top-bar">
            <button class="btn-volver" onclick="volverMenu()">← Volver</button>
            <button class="btn-historial" onclick="toggleHistorial()">📜 Historial</button>
        </div>

        <div class="center-box">

            <input type="text" id="nombre" placeholder="Nombre del Trabajo">
            <input type="number" step="0.001" id="ancho" placeholder="Ancho">
            <input type="number" step="0.001" id="alto" placeholder="Altura">

            <button onclick="calcular()">CALCULAR</button>

            <div id="resultado"></div>

            <div class="history" id="contenedorHistorial" style="display:none;">
                <h3>Historial</h3>
                <div id="historial"></div>
                <button class="delete-btn" onclick="limpiarHistorial()">Borrar Todo</button>
            </div>

        </div>
    </div>

    <!-- SECCION GABINETE -->
    <div id="seccionGabinete" class="section">

        <div class="top-bar">
            <button class="btn-volver" onclick="volverMenu()">← Volver</button>
        </div>

        <div class="center-box">
            <div class="result-box">
                <h3>Gabinete</h3>
                <p>⚙️ Sección pendiente de desarrollo.</p>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
